  <body>
    <header>
      <a href="../index.html"
        ><img
          src="../img/logo.png"
          alt="Kochwelt logo"
      /></a>
      <input
        type="checkbox"
        id="menu-toggle"
      />
      <label
        for="menu-toggle"

        <span></span>
        <span></span>
        <span></span>

      <ul>
        <li>

        <li>

        <li>

    <div class="kontakt_feld">
      <h2>Kontaktiere uns</h2>

      <p class="margin_bottom_0">Dein Name:</p>
      <input
        name="Dein Name"
        type="text"
        class="basic_style"
      />

      <p class="margin_bottom_0">Deine Email:</p>
      <input
        name="deine Email"
        type="text"
        class="basic_style"
      />

      <p class="margin_bottom_0">Deine Nachricht:</p>
      <textarea class="basic_style deine_nachricht_height">
Ihre Nachricht...</textarea
      >

      <form
        action="mailto:mauch.benaja@gmx.de"
        method="post"
        enctype="text/plain"
      >
        <button
          type="submit"
          class="abschicken"
        >
          Abschicken
        </button>
      </form>
    </div>
