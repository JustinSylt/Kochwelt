<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Kontakt - Kochwelt</title>
    <link
      rel="stylesheet"
      href="../styles/main.css"
    />
    <link
      rel="stylesheet"
      href="../styles/header.css"
    />
    <link
      rel="stylesheet"
      href="../styles/kontakt.css"
    />
    <link
      rel="shortcut icon"
      href="../img/fav_icon/favicon.ico"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="../styles/footer.css"
    />
    <script
      src="../scripts/header.js"
      defer
    ></script>
    <script
      src="../scripts/kontakt.js"
      defer
    ></script>
  </head>
  <body>
    <header>
      <a href="../index.html"
        ><img
          src="../img/logo.png"
          alt="Kochwelt logo"
      /></a>
      <input
        type="checkbox"
        id="menu-toggle"
      />
      <label
        for="menu-toggle"
        class="burger"
      >
        <span></span>
        <span></span>
        <span></span>
      </label>
      <ul>
        <li>
          <a href="../index.html">Start</a>
          <div class="link-underline"></div>
        </li>
        <li>
          <a href="./david_recip.html">Rezept des Tages</a>
          <div class="link-underline"></div>
        </li>
        <li>
          <a
            href="./kontakt.html"
            id="active-link"
            >Kontakt</a
          >
          <div
            class="link-underline"
            id="active-link-underline"
          ></div>
        </li>
        <li>
          <a href="./impressum.html">Impressum</a>
          <div class="link-underline"></div>
        </li>
        <li>
          <a href="../pages/Datenschutz.html">Datenschutz</a>
          <div class="link-underline"></div>
        </li>
      </ul>
    </header>

    <form
      action="https://formspree.io/f/xojpdeyk"
      method="POST"
      class="kontakt_feld"
      id="contact-form"
    >
      <label class="form-label"><h1>contact us</h1></label>
      <label class="form-label">
        Your email:
        <input
          type="email"
          name="email"
          required
          placeholder="max@mustermann.com"
        />
      </label>
      <label
        id="text-area"
        class="form-label"
      >
        Your message:
        <textarea
          name="message"
          required
          class="deine_nachricht_height"
          placeholder="your message..."
        ></textarea>
      </label>
      <button
        type="submit"
        class="abschicken"
      >
        Send
      </button>
    </form>

    <footer>
      <a href="../index.html">
        <img
          id="footer-logo"
          src="../img/logo.png"
          alt="logo image" />
        <img
          id="footer-logo-small"
          src="../img/logo_small.png"
          alt=""
      /></a>
      <div class="social-container">
        <a
          href="https://www.instagram.com/"
          target="_blank"
          ><img
            src="../img/instagram.png"
            alt=""
            class="footer-social-img" /></a
        ><a
          href="https://www.x.com/"
          target="_blank"
          ><img
            src="../img/twitter.png"
            alt=""
            class="footer-social-img" /></a
        ><a
          href="https://www.linkedin.com/"
          target="_blank"
          ><img
            src="../img/linkedin.png"
            alt=""
            class="footer-social-img"
        /></a>
      </div>
    </footer>
  </body>
</html>
